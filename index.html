<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="manifest" href="manifest.json">
    <title>Life RPG</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="settings-overlay" class="settings-overlay hidden">
        <div class="settings-panel">
            <div class="settings-header">
                <h3>⚙️ Настройки</h3>
                <button id="settings-close" class="settings-close">✕</button>
            </div>

            <div class="settings-section">
                <div class="section-title">Сферы</div>
                <div id="settings-spheres-list" class="settings-input-group"></div>
                <button id="settings-save" class="btn-primary" style="margin-top: 16px;">💾 Сохранить сферы</button>
            </div>

            <div class="settings-section">
                <div class="section-title">Привычки</div>
                <div id="settings-habits-list" class="settings-input-group"></div>
                <div class="settings-habit-form">
                    <input id="new-habit-input" class="settings-name" type="text" placeholder="Название привычки" maxlength="40">
                    <textarea id="new-habit-purpose" class="settings-purpose" placeholder="Смысл / цель / зачем ты это делаешь" maxlength="140"></textarea>
                    <button id="add-habit-btn" class="btn-secondary">➕ Добавить привычку</button>
                </div>
                <button id="settings-habits-save" class="btn-primary" style="margin-top: 16px;">💾 Сохранить привычки</button>
            </div>

            <div class="settings-section">
                <div class="section-title">Резервная копия</div>
                <div class="backup-actions">
                    <button id="export-data-btn" class="btn-secondary">📤 Экспортировать данные</button>
                    <label class="btn-secondary" style="display: flex; align-items: center; justify-content: center; cursor: pointer;">
                        📥 Импортировать данные
                        <input id="import-data-input" type="file" accept="application/json" style="display: none;">
                    </label>
                </div>
            </div>

            <div class="settings-section">
                <div class="section-title">Опасная зона</div>
                <button id="settings-reset" class="btn-secondary" style="color: #f87171; border-color: #452222;">🗑️ Сбросить все данные</button>
            </div>
        </div>
    </div>

    <header class="app-header">
        <div class="header-content">
            <h1 class="logo">Life RPG</h1>
            <button id="open-settings" class="icon-btn">⚙️</button>
        </div>
    </header>

    <main class="dashboard">
        <!-- HERO SECTION: Ostatok -->
        <section class="hero-card">
            <div class="hero-top">
                <div class="hero-title">Твоё время ограничено</div>
                <div class="hero-subtitle">Каждый день — это шанс.</div>
            </div>
            
            <div class="hero-stats">
                <div class="stat-item">
                    <span class="stat-value" id="days-count">0</span>
                    <span class="stat-label">дней прожито</span>
                </div>
                <div class="stat-divider"></div>
                <div class="stat-item">
                    <span class="stat-value" id="days-percent">0</span>%
                    <span class="stat-label">пути</span>
                </div>
            </div>

            <div id="ritual-container" class="day-ritual">
                <div class="start-day-hold" id="start-day-hold">
                    <div class="start-day-fill" id="start-day-fill"></div>
                    <div class="start-day-text" id="start-day-text">Удерживай, чтобы начать день</div>
                </div>
            </div>
        </section>

        <!-- SPHERES SECTION: Quick View Grid -->
        <section class="dashboard-section">
            <div class="section-header">
                <h2 class="section-title-main">🌀 Сферы</h2>
            </div>
            <div id="spheres-grid" class="spheres-grid"></div>
        </section>

        <!-- HABITS SECTION: Daily List -->
        <section class="dashboard-section">
            <div class="section-header">
                <h2 class="section-title-main">✅ Привычки</h2>
            </div>
            <div id="habits-container" class="habits-list"></div>
        </section>

        <!-- ANALYSIS SECTION: Wheel & Years -->
        <section class="dashboard-section analysis-section">
            <div class="section-header">
                <h2 class="section-title-main">📊 Анализ</h2>
            </div>
            <div class="analysis-tabs">
                <button class="analysis-tab active" data-type="wheel">Колесо</button>
                <button class="analysis-tab" data-type="years">30 лет</button>
            </div>
            
            <div id="wheel-view" class="analysis-view">
                <canvas id="wheel-canvas"></canvas>
            </div>
            <div id="years-view" class="analysis-view hidden">
                <div id="years-grid"></div>
            </div>
        </section>
    </main>

    <script src="app.js"></script>
</body>
</html>
