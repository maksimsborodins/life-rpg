<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"> 
    <link rel="manifest" href="manifest.json">
    <title>Life RPG | Premium</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- Glassmorphism Settings Overlay -->
    <div id="settings-overlay" class="settings-overlay hidden">
        <div class="settings-panel">
            <div class="settings-header">
                <div class="header-title-group">
                    <span class="icon-gear">⚙️</span>
                    <h3>Настройки</h3>
                </div>
                <button id="settings-close" class="settings-close-btn" aria-label="Закрыть">✕</button>
            </div>

            <div class="settings-content">
                <!-- Spheres Section -->
                <div class="settings-section">
                    <div class="section-label">
                        <span class="dot primary"></span>
                        <h4>Сферы жизни</h4>
                    </div>
                    <div id="settings-spheres-list" class="settings-grid"></div>
                    <div class="section-actions">
                        <button id="settings-save" class="btn-primary">💾 Сохранить сферы</button>
                    </div>
                </div>

                <!-- Habits Section -->
                <div class="settings-section">
                    <div class="section-label">
                        <span class="dot secondary"></span>
                        <h4>Привычки</h4>
                    </div>
                    <div id="settings-habits-list" class="settings-grid"></div>
                    
                    <div class="add-habit-form card-glass">
                        <h5>+ Новая привычка</h5>
                        <input id="new-habit-input" class="input-glass" type="text" placeholder="Название (например, Медитация)" maxlength="40">
                        <textarea id="new-habit-purpose" class="input-glass" placeholder="Зачем это нужно? (мотивация)" maxlength="140"></textarea>
                        <button id="add-habit-btn" class="btn-secondary">➕ Добавить</button>
                    </div>
                    
                    <div class="section-actions">
                        <button id="settings-save-habits" class="btn-primary">💾 Сохранить список</button>
                    </div>
                </div>

                <!-- Data Management -->
                <div class="settings-section">
                    <div class="section-label">
                        <span class="dot info"></span>
                        <h4>Данные и Бэкап</h4>
                    </div>
                    <div class="data-actions-grid">
                        <button id="export-data" class="btn-glass">📤 Экспорт JSON</button>
                        <button id="import-data-btn" class="btn-glass">📥 Импорт JSON</button>
                        <input id="import-data-input" type="file" accept="application/json" style="display: none;">
                    </div>
                </div>

                <!-- Danger Zone -->
                <div class="settings-section danger-zone">
                    <div class="section-label">
                        <span class="dot danger"></span>
                        <h4>Опасная зона</h4>
                    </div>
                    <p class="section-desc">Действие нельзя будет отменить.</p>
                    <button id="reset-data" class="btn-danger">🗑️ Сбросить всё</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Main Dashboard Application -->
    <div id="app" class="app-container">
        <!-- Floating Header -->
        <header class="main-header">
            <h1 class="logo">Life RPG</h1>
            <button id="settings-open" class="btn-icon" aria-label="Настройки">⚙️</button>
        </header>

        <main class="dashboard-scroll">
            <!-- Hero Progress Card -->
            <section class="hero-section">
                <div class="hero-card card-glass-heavy">
                    <div class="hero-content">
                        <div class="hero-text">
                            <span class="hero-label">Твоё время ограничено</span>
                            <h2 id="hero-title">Каждый день — это шанс.</h2>
                        </div>
                        <div class="hero-stats">
                            <div class="stat-item">
                                <span id="days-lived" class="stat-value">0</span>
                                <span class="stat-label">дней прожито</span>
                            </div>
                            <div class="stat-divider"></div>
                            <div class="stat-item">
                                <span id="life-progress" class="stat-value">0%</span>
                                <span class="stat-label">пути</span>
                            </div>
                        </div>
                    </div>
                    <!-- Action Area -->
                    <div class="hero-footer">
                        <button id="start-day-btn" class="btn-hero-action">Удерживай, чтобы начать день</button>
                    </div>
                </div>
            </section>

            <!-- Dashboard Content Grid -->
            <div class="content-grid">
                <!-- Spheres Section -->
                <section class="dashboard-card card-glass">
                    <div class="card-header">
                        <h3>🌀 Сферы</h3>
                    </div>
                    <div id="spheres-container" class="spheres-layout">
                        <!-- Dynamic content -->
                    </div>
                </section>

                <!-- Habits Section -->
                <section class="dashboard-card card-glass">
                    <div class="card-header">
                        <h3>✅ Привычки</h3>
                    </div>
                    <div id="habits-container" class="habits-list">
                        <!-- Dynamic content -->
                    </div>
                </section>

                <!-- Analysis Section -->
                <section class="dashboard-card card-glass">
                    <div class="card-header">
                        <h3>📊 Анализ</h3>
                    </div>
                    <div id="analysis-container" class="analysis-view">
                        <div id="chart-radar" class="chart-glass"></div>
                        <div class="analysis-stats">
                            <div class="analysis-stat">
                                <span class="label">Средний уровень:</span>
                                <span id="avg-level" class="value">0%</span>
                            </div>
                        </div>
                    </div>
                </section>
            </div>
        </main>
    </div>

    <script src="app.js"></script>
</body>
</html>
